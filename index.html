  collapsed: {}, members: [], assignments: {},
};

/* ââ HELPERS ââ */
function allTasks() { const r=[]; PHASES.forEach(ph=>ph.sections.forEach(s=>s.tasks.forEach(t=>r.push(t)))); return r; }
function getTask(id) { return allTasks().find(t=>t.id===id); }
function phDone(ph) { return ph.sections.flatMap(s=>s.tasks).filter(t=>state.checked[t.id]).length; }
function phTotal(ph) { return ph.sections.flatMap(s=>s.tasks).length; }
function totalDone() { return allTasks().filter(t=>state.checked[t.id]).length; }
function totalAll() { return allTasks().length; }
function getMbr(id) { return state.members.find(m=>m.id===id); }
function initials(name) {
  const p=name.trim().split(/\s+/);
  return p.length===1 ? p[0].substring(0,2).toUpperCase() : (p[0][0]+p[p.length-1][0]).toUpperCase();
}
function activePh() {
  for(let i=0;i<PHASES.length;i++) { if(PHASES[i].sections.flatMap(s=>s.tasks).some(t=>!state.checked[t.id])) return i; }
  return PHASES.length-1;
}

/* ââ SUPABASE ââ */
async function loadState() {
  const {data,error} = await sb.from('gtm_state').select('data').eq('id',1).single();
  if(error){setSS('error','Load failed');return;}
  if(data&&data.data&&Object.keys(data.data).length>0) state={...state,...data.data};
}
function schedSave() { clearTimeout(_timer); _timer=setTimeout(persist,800); }
async function persist() {
  setSS('syncing','Savingâ¦'); _suppress=true;
  const {error}=await sb.from('gtm_state').update({data:state,updated_at:new Date().toISOString()}).eq('id',1);
  if(error){setSS('error','Save failed');_suppress=false;return;}
  setSS('synced','â Synced'); setTimeout(()=>setSS('synced','â Live'),1500);
}
function setupRT() {
  sb.channel('gtm_ch').on('postgres_changes',{event:'UPDATE',schema:'public',table:'gtm_state',filter:'id=eq.1'},(p)=>{
    if(_suppress){_suppress=false;return;}
    const r=p.new.data;
    if(r&&typeof r==='object'){state={...state,...r};renderAll();setSS('updated','â Updated');setTimeout(()=>setSS('synced','â Live'),2000);}
  }).subscribe(s=>{if(s==='SUBSCRIBED')setSS('synced','â Live');});
}
function setSS(cls,txt) {
  const el=document.getElementById('sync-status');
  const dot=el.querySelector('.sync-dot');
  el.className=cls; document.getElementById('sync-label').textContent=txt;
  dot.className='sync-dot'+(cls==='syncing'?' pulse':'');
}

function renderAll() {
  renderKpis(); renderFocus(); renderFilterBar(); renderPhases();
  document.getElementById('ovr-pct').textContent = totalAll()?Math.round(totalDone()/totalAll()*100):0;
}

function renderKpis() {
  document.getElementById('kpi-section').innerHTML = KPIS.map(k=>`
    <div class="kpi-tile">
      <div class="kpi-icon">${k.icon}</div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value"><input type="number" min="0" value="${state.kpis[k.id]||0}" data-kpi="${k.id}" /></div>
      <div class="kpi-target">${k.target}</div>
    </div>`).join('');
  document.querySelectorAll('[data-kpi]').forEach(inp=>inp.addEventListener('change',e=>{
    state.kpis[e.target.dataset.kpi]=Number(e.target.value); schedSave();
  }));
}

function renderFocus() {
  const ph=PHASES[activePh()];
  document.getElementById('focus-section').innerHTML=`
    <div class="focus-eyebrow">ð¯ CURRENT FOCUS</div>
    <div class="focus-title">Phase ${ph.num} â ${ph.title}</div>
    <div class="focus-desc">${ph.goal}</div>
    <div class="focus-tags">${ph.tags.map(t=>`<span class="focus-tag">${t}</span>`).join('')}</div>`;
}

function renderFilterBar() {
  document.getElementById('member-chips').innerHTML = state.members.map(m=>`
    <button class="filter-chip ${activeFilter===m.id?'active':''}" data-fid="${m.id}">
      <span class="chip-avatar" style="background:${m.color}">${initials(m.name)}</span>${m.name}
    </button>`).join('');
  document.querySelectorAll('[data-fid]').forEach(b=>b.onclick=()=>{
    activeFilter=b.dataset.fid;
    document.querySelectorAll('[data-fid]').forEach(x=>x.classList.toggle('active',x.dataset.fid===activeFilter));
    applyFilter();
  });
}

function applyFilter() {
  document.querySelectorAll('.task-row').forEach(row=>{
    if(activeFilter==='all'){row.classList.remove('hidden-by-filter');return;}
    row.classList.toggle('hidden-by-filter', state.assignments[row.dataset.tid]!==activeFilter);
  });
}

function renderPhases() {
  document.getElementById('phases-container').innerHTML = PHASES.map(ph=>{
    const done=phDone(ph), total=phTotal(ph), pct=total?Math.round(done/total*100):0;
    const open=state.collapsed[ph.id]!==false;
    const secs=ph.sections.map(sec=>`
      <div class="phase-section">
        <div class="section-header"><span>${sec.t}</span><span class="section-count">${sec.tasks.filter(t=>state.checked[t.id]).length}/${sec.tasks.length}</span></div>
        ${sec.tasks.map(task=>taskRowHtml(task)).join('')}
      </div>`).join('');
    return `
    <div class="phase-card pc-${ph.id}" id="pc-${ph.id}">
      <div class="phase-header" data-pid="${ph.id}">
        <div class="ph-left">
          <div class="phase-num">PHASE ${ph.num}</div>
          <div class="phase-title">${ph.title}</div>
          <div class="phase-timeline">${ph.timeline}</div>
          <div class="phase-goal">${ph.goal}</div>
        </div>
        <div class="ph-right">
          <div><div class="phase-prog-count">${done}/${total}</div><div class="phase-prog-label">tasks done</div></div>
          <div class="phase-chevron ${open?'open':''}">â¼</div>
        </div>
      </div>
      <div class="phase-progress-bar"><div class="phase-progress-fill" style="width:${pct}%"></div></div>
      <div class="phase-body ${open?'open':''}">${secs}</div>
    </div>`;
  }).join('');

  // Phase toggle
  document.querySelectorAll('.phase-header[data-pid]').forEach(hdr=>hdr.addEventListener('click',e=>{
    if(e.target.closest('.task-row')) return;
    const pid=hdr.dataset.pid;
    const body=hdr.parentElement.querySelector('.phase-body');
    const chev=hdr.querySelector('.phase-chevron');
    const isOpen=body.classList.toggle('open');
    chev.classList.toggle('open',isOpen);
    state.collapsed[pid]=isOpen; schedSave();
  }));

  // Checkboxes
  document.querySelectorAll('.task-checkbox').forEach(chk=>chk.addEventListener('change',e=>{
    const id=e.target.dataset.tid;
    state.checked[id]=e.target.checked;
    const row=e.target.closest('.task-row');
    row.classList.toggle('completed',e.target.checked);
    updatePhCard(row.closest('.phase-card'));
    document.getElementById('ovr-pct').textContent=Math.round(totalDone()/totalAll()*100);
    renderFocus(); schedSave();
  }));

  // Assign buttons
  document.querySelectorAll('.assign-wrap').forEach(wrap=>wrap.addEventListener('click',e=>{
    e.stopPropagation();
    const tid=wrap.dataset.tid;
    if(openDropTask===tid){closeDrop();return;}
    closeDrop(); openDropTask=tid; showDrop(wrap,tid);
  }));

  document.addEventListener('click',()=>closeDrop());
  applyFilter();
}

function taskRowHtml(task) {
  const chk=state.checked[task.id];
  const mid=state.assignments[task.id];
  const m=mid?getMbr(mid):null;
  const av = m
    ? `<div class="assign-avatar" style="background:${m.color};border-color:${m.color}" title="${m.name}">${initials(m.name)}</div>`
    : `<div class="assign-avatar unassigned" title="Assign">+</div>`;
  const assignBtn = state.members.length
    ? `<div class="assign-wrap" data-tid="${task.id}" title="Assign to team member">${av}</div>` : '';
  return `<div class="task-row ${chk?'completed':''}" data-tid="${task.id}">
    <input type="checkbox" class="task-checkbox" data-tid="${task.id}" ${chk?'checked':''} />
    <span class="task-text">${task.t}</span>
    ${assignBtn}
  </div>`;
}

function showDrop(wrap,tid) {
  const mid=state.assignments[tid];
  const d=document.createElement('div');
  d.className='assign-dropdown'; d.id='adrop';
  d.innerHTML = state.members.map(m=>`
    <div class="assign-option" data-mid="${m.id}">
      <span class="ao-avatar" style="background:${m.color}">${initials(m.name)}</span>${m.name}
    </div>`).join('')
    + (mid?`<div class="assign-divider"></div><div class="assign-option" data-mid="__none"><span class="ao-avatar" style="background:#e2e8f0;color:#64748b">â</span>Unassign</div>`:'');
  d.querySelectorAll('.assign-option').forEach(opt=>opt.addEventListener('click',e=>{
    e.stopPropagation();
    const mid2=opt.dataset.mid;
    if(mid2==='__none') delete state.assignments[tid];
    else state.assignments[tid]=mid2;
    closeDrop();
    // Patch just the assign button of this row
    const row=document.querySelector(`.task-row[data-tid="${tid}"]`);
    if(row){
      const task=getTask(tid);
      if(task){
        const newMid=state.assignments[tid];
        const m2=newMid?getMbr(newMid):null;
        const newAv = m2
          ? `<div class="assign-avatar" style="background:${m2.color};border-color:${m2.color}" title="${m2.name}">${initials(m2.name)}</div>`
          : `<div class="assign-avatar unassigned" title="Assign">+</div>`;
        let aw=row.querySelector('.assign-wrap');
        if(!aw&&state.members.length){
          aw=document.createElement('div'); aw.className='assign-wrap'; aw.dataset.tid=tid; row.appendChild(aw);
          aw.addEventListener('click',ev=>{ev.stopPropagation();if(openDropTask===tid){closeDrop();return;}closeDrop();openDropTask=tid;showDrop(aw,tid);});
        }
        if(aw) aw.innerHTML=newAv;
      }
    }
    applyFilter(); schedSave();
  }));
  wrap.style.position='relative'; wrap.appendChild(d);
}

function closeDrop() {
  const d=document.getElementById('adrop'); if(d) d.remove(); openDropTask=null;
}

function updatePhCard(card) {
  if(!card) return;
  const pid=card.id.replace('pc-','');
  const ph=PHASES.find(p=>p.id===pid); if(!ph) return;
  const done=phDone(ph), total=phTotal(ph), pct=total?Math.round(done/total*100):0;
  const pc=card.querySelector('.phase-prog-count'); if(pc) pc.textContent=`${done}/${total}`;
  const pf=card.querySelector('.phase-progress-fill'); if(pf) pf.style.width=pct+'%';
  card.querySelectorAll('.phase-section').forEach(sec=>{
    const sc=sec.querySelector('.section-count');
    if(sc){const d2=sec.querySelectorAll('.task-row.completed').length,t2=sec.querySelectorAll('.task-row').length;sc.textContent=`${d2}/${t2}`;}
  });
}

/* ââ MEMBER MODAL ââ */
function renderMList() {
  const el=document.getElementById('m-list');
  el.innerHTML=state.members.length
    ? state.members.map(m=>`
      <div class="m-item">
        <div class="m-av" style="background:${m.color}">${initials(m.name)}</div>
        <div class="m-name">${m.name}</div>
        <button class="m-rm" data-rmid="${m.id}" title="Remove">Ã</button>
      </div>`).join('')
    : '<div class="empty-m">No team members yet. Add one below.</div>';
  el.querySelectorAll('[data-rmid]').forEach(btn=>btn.onclick=()=>{
    const id=btn.dataset.rmid;
    state.members=state.members.filter(m=>m.id!==id);
    Object.keys(state.assignments).forEach(tid=>{if(state.assignments[tid]===id)delete state.assignments[tid];});
    if(activeFilter===id){activeFilter='all';document.querySelectorAll('[data-fid]').forEach(b=>b.classList.toggle('active',b.dataset.fid==='all'));}
    renderAll(); schedSave();
  });
}

function renderSwatches() {
  document.getElementById('swatches').innerHTML=PALETTE.map(c=>`
    <div class="swatch ${c===selColor?'sel':''}" style="background:${c}" data-c="${c}"></div>`).join('');
  document.querySelectorAll('.swatch').forEach(s=>s.onclick=()=>{selColor=s.dataset.c;renderSwatches();});
}

/* ââ EVENTS ââ */
document.getElementById('team-btn').onclick=()=>{
  document.getElementById('team-overlay').classList.add('open');
  renderMList(); renderSwatches();
};
document.getElementById('modal-close').onclick=()=>document.getElementById('team-overlay').classList.remove('open');
document.getElementById('team-overlay').onclick=e=>{if(e.target===e.currentTarget)document.getElementById('team-overlay').classList.remove('open');};

document.getElementById('add-btn').onclick=()=>{
  const inp=document.getElementById('new-name'); const name=inp.value.trim(); if(!name) return;
  state.members.push({id:'m'+Date.now(),name,color:selColor});
  inp.value=''; selColor=PALETTE[state.members.length%PALETTE.length];
  renderAll(); renderMList(); renderSwatches(); schedSave();
};
document.getElementById('new-name').onkeydown=e=>{if(e.key==='Enter')document.getElementById('add-btn').click();};

document.getElementById('reset-btn').onclick=()=>{
  if(!confirm('Reset all task progress? Members, assignments, and KPIs will be kept.')) return;
  state.checked={}; state.collapsed={};
  PHASES.forEach((ph,i)=>state.collapsed[ph.id]=i===0);
  renderAll(); schedSave();
};
document.getElementById('save-btn').onclick=persist;

/* ââ INIT ââ */
(async function() {
  setSS('syncing','Connectingâ¦');
  PHASES.forEach((ph,i)=>{if(!(ph.id in state.collapsed))state.collapsed[ph.id]=i===0;});
  await loadState();
  PHASES.forEach((ph,i)=>{if(!(ph.id in state.collapsed))state.collapsed[ph.id]=i===0;});
  renderAll();
  const ov=document.getElementById('loading-overlay');
  ov.classList.add('hidden'); setTimeout(()=>ov.style.display='none',500);
  setupRT();
})();
</script>
