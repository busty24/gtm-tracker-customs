<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Declaration AI — GTM Tracker</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='bg' cx='38%25' cy='32%25' r='55%25'%3E%3Cstop offset='0%25' stop-color='%237dd3fc'/%3E%3Cstop offset='100%25' stop-color='%230ea5e9'/%3E%3C/radialGradient%3E%3C/defs%3E%3Cpath d='M50,5L55,18L65,8L66,22L78,15L75,28L90,24L83,36L96,38L87,47L98,52L87,57L96,65L84,66L90,78L78,74L80,88L68,80L66,92L56,82L50,95L44,82L34,92L32,80L20,88L22,74L10,78L16,66L4,65L13,57L2,52L13,47L4,38L17,36L10,24L25,28L22,15L34,22L35,8L45,18Z' fill='url(%23bg)' stroke='%230369a1' stroke-width='1.5'/%3E%3Cellipse cx='37' cy='42' rx='10' ry='12' fill='white'/%3E%3Cellipse cx='63' cy='42' rx='10' ry='12' fill='white'/%3E%3Cellipse cx='39' cy='44' rx='5.5' ry='7' fill='%230f172a'/%3E%3Cellipse cx='61' cy='44' rx='5.5' ry='7' fill='%230f172a'/%3E%3Ccircle cx='42' cy='40' r='2.5' fill='white' opacity='0.8'/%3E%3Ccircle cx='64' cy='40' r='2.5' fill='white' opacity='0.8'/%3E%3Cpath d='M25,30L43,36' stroke='%230c4a6e' stroke-width='3.5' stroke-linecap='round'/%3E%3Cpath d='M75,30L57,36' stroke='%230c4a6e' stroke-width='3.5' stroke-linecap='round'/%3E%3Cpath d='M28,60Q50,90,72,60Z' fill='%230a1628'/%3E%3Cpath d='M36,60L40,70L44,60' fill='white'/%3E%3Cpath d='M56,60L60,70L64,60' fill='white'/%3E%3Cpath d='M46,78L50,70L54,78' fill='white'/%3E%3C/svg%3E" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: #1e293b; min-height: 100vh; }

    /* Loading */
    #loading-overlay { position: fixed; inset: 0; background: #0f1923; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity .5s; }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid #1e3a5f; border-top-color: #3b82f6; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }
    .loading-text { color: #94a3b8; font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Header */
    header { background: #0f1923; color: white; padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.4); flex-wrap: wrap; gap: 12px; }
    .header-left h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
    .header-left p { font-size: 12px; color: #64748b; margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .progress-badge { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 700; color: #f59e0b; white-space: nowrap; }
    .team-btn { background: #1e3a5f; border: 1px solid #2563eb; color: #93c5fd; padding: 7px 14px; border-radius: 7px; font-size: 13px; cursor: pointer; transition: background .15s; white-space: nowrap; }
    .team-btn:hover { background: #1d4ed8; }
    #sync-status { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 5px 10px; border-radius: 6px; background: #1e293b; border: 1px solid #334155; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; }
    .sync-dot.pulse { animation: pulse-anim 1.5s infinite; }
    @keyframes pulse-anim { 0%,100%{opacity:1} 50%{opacity:.3} }
    #sync-status.synced .sync-dot { background: #10b981; }
    #sync-status.syncing .sync-dot { background: #f59e0b; }
    #sync-status.error .sync-dot { background: #ef4444; }
    #sync-status.updated .sync-dot { background: #3b82f6; }

    /* Filter Bar */
    #filter-bar { background: #1a2535; border-bottom: 1px solid #2d3748; padding: 10px 28px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .5px; margin-right: 4px; }
    .filter-chip { border: 1px solid #334155; background: transparent; color: #94a3b8; padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px; }
    .filter-chip:hover { border-color: #64748b; color: #e2e8f0; }
    .filter-chip.active { background: #2563eb; border-color: #2563eb; color: white; font-weight: 600; }
    .chip-avatar { width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: white; flex-shrink: 0; }

    /* KPI Tiles */
    #kpi-section { padding: 20px 28px 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
    .kpi-tile { background: white; border-radius: 12px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); position: relative; overflow: hidden; }
    .kpi-tile:nth-child(1) { border-left: 4px solid #3b82f6; }
    .kpi-tile:nth-child(2) { border-left: 4px solid #10b981; }
    .kpi-tile:nth-child(3) { border-left: 4px solid #8b5cf6; }
    .kpi-tile:nth-child(4) { border-left: 4px solid #f59e0b; }
    .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: #64748b; margin-bottom: 8px; }
    .kpi-value input { font-size: 28px; font-weight: 800; color: #0f1923; border: none; outline: none; width: 100%; background: transparent; -moz-appearance: textfield; }
    .kpi-value input::-webkit-outer-spin-button, .kpi-value input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .kpi-target { font-size: 11px; color: #94a3b8; margin-top: 6px; }
    .kpi-icon { position: absolute; right: 16px; top: 16px; font-size: 22px; opacity: .35; }

    /* Current Focus */
    #focus-section { margin: 18px 28px 0; background: #0f2742; border: 1px solid #1e4a7a; border-radius: 12px; padding: 18px 22px; }
    .focus-eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #3b82f6; font-weight: 700; margin-bottom: 6px; }
    .focus-title { font-size: 17px; font-weight: 700; color: white; margin-bottom: 6px; }
    .focus-desc { font-size: 13px; color: #94a3b8; line-height: 1.5; margin-bottom: 12px; }
    .focus-tags { display: flex; flex-wrap: wrap; gap: 7px; }
    .focus-tag { background: rgba(59,130,246,.15); border: 1px solid rgba(59,130,246,.3); color: #93c5fd; padding: 4px 10px; border-radius: 5px; font-size: 12px; }

    /* Action Bar */
    #action-bar { margin: 14px 28px 0; display: flex; gap: 10px; justify-content: flex-end; }
    .btn-reset { background: transparent; border: 1px solid #334155; color: #64748b; padding: 8px 18px; border-radius: 7px; font-size: 13px; cursor: pointer; transition: all .15s; }
    .btn-reset:hover { border-color: #ef4444; color: #ef4444; }
    .btn-save { background: #16a34a; border: none; color: white; padding: 8px 18px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn-save:hover { background: #15803d; }

    /* Phases */
    #phases-container { padding: 18px 28px 48px; display: flex; flex-direction: column; gap: 18px; }
    .phase-card { background: white; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; }
    .phase-header { padding: 18px 22px; display: flex; align-items: flex-start; justify-content: space-between; cursor: pointer; user-select: none; border-left: 5px solid transparent; transition: background .15s; }
    .phase-header:hover { background: #f8fafc; }
    .ph-left { flex: 1; }
    .phase-num { font-size: 11px; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; }
    .phase-title { font-size: 17px; font-weight: 700; color: #0f1923; }
    .phase-timeline { font-size: 12px; color: #64748b; margin-top: 3px; }
    .phase-goal { font-size: 12px; color: #475569; margin-top: 6px; line-height: 1.45; max-width: 680px; }
    .ph-right { display: flex; align-items: flex-start; gap: 14px; flex-shrink: 0; margin-left: 16px; }
    .phase-prog-count { font-size: 15px; font-weight: 700; color: #0f1923; text-align: right; }
    .phase-prog-label { font-size: 10px; color: #94a3b8; text-align: right; }
    .phase-chevron { font-size: 14px; color: #94a3b8; transition: transform .2s; margin-top: 2px; flex-shrink: 0; }
    .phase-chevron.open { transform: rotate(180deg); }
    .phase-progress-bar { height: 3px; background: #f1f5f9; }
    .phase-progress-fill { height: 3px; transition: width .4s; }
    .phase-body { padding: 0 22px 18px; display: none; }
    .phase-body.open { display: block; }

    /* Phase colors */
    .pc-p1 .phase-header { border-left-color: #3b82f6; } .pc-p1 .phase-num { color: #3b82f6; } .pc-p1 .phase-progress-fill { background: #3b82f6; }
    .pc-p2 .phase-header { border-left-color: #10b981; } .pc-p2 .phase-num { color: #10b981; } .pc-p2 .phase-progress-fill { background: #10b981; }
    .pc-p3 .phase-header { border-left-color: #f59e0b; } .pc-p3 .phase-num { color: #f59e0b; } .pc-p3 .phase-progress-fill { background: #f59e0b; }
    .pc-p4 .phase-header { border-left-color: #8b5cf6; } .pc-p4 .phase-num { color: #8b5cf6; } .pc-p4 .phase-progress-fill { background: #8b5cf6; }
    .pc-p5 .phase-header { border-left-color: #ec4899; } .pc-p5 .phase-num { color: #ec4899; } .pc-p5 .phase-progress-fill { background: #ec4899; }
    .pc-p6 .phase-header { border-left-color: #06b6d4; } .pc-p6 .phase-num { color: #06b6d4; } .pc-p6 .phase-progress-fill { background: #06b6d4; }
    .pc-p7 .phase-header { border-left-color: #ef4444; } .pc-p7 .phase-num { color: #ef4444; } .pc-p7 .phase-progress-fill { background: #ef4444; }

    /* Section */
    .phase-section { margin-top: 8px; }
    .section-header { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; padding: 14px 0 7px; border-bottom: 1px solid #f1f5f9; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; }
    .section-count { font-size: 10px; color: #cbd5e1; font-weight: 400; }

    /* Task row */
    .task-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 2px; border-bottom: 1px solid #f8fafc; }
    .task-row:last-child { border-bottom: none; }
    .task-row.completed .task-text { text-decoration: line-through; color: #94a3b8; }
    .task-row.hidden-by-filter { display: none; }
    .task-checkbox { width: 17px; height: 17px; border-radius: 4px; border: 2px solid #cbd5e1; cursor: pointer; flex-shrink: 0; margin-top: 1px; appearance: none; -webkit-appearance: none; transition: all .15s; }
    .task-checkbox:checked { background: #10b981; border-color: #10b981; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='white' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: center; }
    .task-text { flex: 1; font-size: 13.5px; color: #334155; line-height: 1.5; }
    .task-assign-wrap { flex-shrink: 0; position: relative; }
    .assign-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: white; cursor: pointer; border: 2px solid white; box-shadow: 0 1px 3px rgba(0,0,0,.15); transition: transform .1s; }
    .assign-avatar:hover { transform: scale(1.12); }
    .assign-avatar.unassigned { background: #e2e8f0; color: #94a3b8; font-size: 13px; font-weight: 400; border-color: #cbd5e1; }

    /* Assign dropdown */
    .assign-dropdown { position: absolute; right: 0; top: 30px; background: white; border: 1px solid #e2e8f0; border-radius: 9px; box-shadow: 0 4px 20px rgba(0,0,0,.12); z-index: 50; min-width: 160px; overflow: hidden; }
    .assign-option { display: flex; align-items: center; gap: 9px; padding: 8px 13px; font-size: 13px; color: #334155; cursor: pointer; transition: background .1s; }
    .assign-option:hover { background: #f1f5f9; }
    .ao-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: white; flex-shrink: 0; }
    .assign-divider { height: 1px; background: #f1f5f9; margin: 2px 0; }

    /* Team Modal */
    #team-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; }
    #team-overlay.open { display: flex; }
    .modal-box { background: white; border-radius: 14px; width: 420px; max-width: 95vw; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
    .modal-hd { padding: 18px 22px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
    .modal-hd-title { font-size: 16px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 22px; color: #94a3b8; cursor: pointer; line-height: 1; }
    .modal-bd { padding: 18px 22px; overflow-y: auto; flex: 1; }
    .m-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; min-height: 40px; }
    .m-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #f8fafc; border-radius: 8px; }
    .m-av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; }
    .m-name { flex: 1; font-size: 14px; font-weight: 500; }
    .m-rm { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 18px; transition: color .15s; line-height: 1; }
    .m-rm:hover { color: #ef4444; }
    .add-form { border-top: 1px solid #f1f5f9; padding-top: 16px; }
    .add-form-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #64748b; margin-bottom: 10px; }
    .add-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .add-input { flex: 1; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 7px; font-size: 13px; outline: none; transition: border-color .15s; }
    .add-input:focus { border-color: #3b82f6; }
    .add-btn { background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .add-btn:hover { background: #1d4ed8; }
    .swatches { display: flex; gap: 7px; flex-wrap: wrap; }
    .swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform .1s; }
    .swatch:hover { transform: scale(1.2); }
    .swatch.sel { border-color: #0f1923; transform: scale(1.15); }
    .empty-m { color: #94a3b8; font-size: 13px; text-align: center; padding: 10px 0; }

    /* Add Task */
    .add-task-btn { display: flex; align-items: center; gap: 6px; background: none; border: 1px dashed #cbd5e1; color: #94a3b8; padding: 7px 14px; border-radius: 7px; font-size: 12px; cursor: pointer; margin-top: 8px; transition: all .15s; width: 100%; justify-content: center; }
    .add-task-btn:hover { border-color: #3b82f6; color: #3b82f6; background: rgba(59,130,246,.04); }
    .add-task-row { display: flex; align-items: center; gap: 8px; padding: 8px 2px; margin-top: 4px; }
    .add-task-input { flex: 1; padding: 7px 12px; border: 1px solid #3b82f6; border-radius: 7px; font-size: 13px; outline: none; color: #1e293b; background: #f8fafc; }
    .add-task-input::placeholder { color: #94a3b8; }
    .add-task-confirm { background: #10b981; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .add-task-confirm:hover { background: #059669; }
    .add-task-cancel { background: none; border: 1px solid #e2e8f0; color: #94a3b8; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .add-task-cancel:hover { color: #ef4444; border-color: #ef4444; }
    .task-delete { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; transition: color .15s; }
    .task-delete:hover { color: #ef4444; }

    /* Monster Mascot */
    #gtm-monster {
      position: fixed; bottom: -100px; z-index: 9998; cursor: pointer; pointer-events: none;
      width: 80px; height: 80px; filter: drop-shadow(0 -2px 12px rgba(14,165,233,0.35));
      transition: transform 0.2s;
    }
    #gtm-monster:hover { transform: scale(1.15) rotate(-8deg) !important; }
    #gtm-monster.peek-right {
      right: 40px; left: auto; pointer-events: auto;
      animation: monsterPeekUp 5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    #gtm-monster.peek-left {
      left: 40px; right: auto; pointer-events: auto;
      animation: monsterPeekUp 5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    #gtm-monster.run-across {
      bottom: 30px; pointer-events: auto;
      animation: monsterRun 4s linear forwards;
    }
    #gtm-monster.peek-right .monster-eyes,
    #gtm-monster.peek-left .monster-eyes { animation: eyesLook 1.5s ease-in-out 0.6s 2; }
    #gtm-monster.clicked { animation: monsterBounce 0.6s ease-in-out !important; bottom: -10px !important; pointer-events: auto; }

    @keyframes monsterPeekUp {
      0%   { bottom: -100px; transform: rotate(0deg); }
      18%  { bottom: -8px;   transform: rotate(-6deg); }
      28%  { bottom: -8px;   transform: rotate(6deg); }
      38%  { bottom: -8px;   transform: rotate(-3deg); }
      50%  { bottom: -5px;   transform: rotate(0deg); }
      78%  { bottom: -5px;   transform: rotate(0deg); }
      100% { bottom: -100px; transform: rotate(0deg); }
    }
    @keyframes monsterRun {
      0%   { left: -100px; transform: scaleX(1) translateY(0); }
      25%  { transform: scaleX(1) translateY(-15px) rotate(-8deg); }
      50%  { transform: scaleX(1) translateY(0) rotate(0deg); }
      75%  { transform: scaleX(1) translateY(-15px) rotate(8deg); }
      100% { left: calc(100vw + 100px); transform: scaleX(1) translateY(0); }
    }
    @keyframes eyesLook {
      0%, 100% { transform: translateX(0); }
      35% { transform: translateX(-2.5px); }
      65% { transform: translateX(2.5px); }
    }
    @keyframes monsterBounce {
      0%   { transform: translateY(0) scale(1); }
      30%  { transform: translateY(-30px) scale(1.1) rotate(-10deg); }
      50%  { transform: translateY(-40px) scale(1.15) rotate(5deg); }
      70%  { transform: translateY(-20px) scale(1.05) rotate(-3deg); }
      100% { transform: translateY(0) scale(1) rotate(0deg); }
    }

    @media (max-width: 640px) {
      header, #filter-bar, #kpi-section, #focus-section, #action-bar, #phases-container { padding-left: 14px; padding-right: 14px; }
      #kpi-section { grid-template-columns: 1fr 1fr; }
      .phase-goal { display: none; }
    }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading shared progress…</div>
</div>

<div id="team-overlay">
  <div class="modal-box">
    <div class="modal-hd">
      <div class="modal-hd-title">👥 Team Members</div>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-bd">
      <div class="m-list" id="m-list"></div>
      <div class="add-form">
        <div class="add-form-title">Add Team Member</div>
        <div class="add-row">
          <input type="text" class="add-input" id="new-name" placeholder="Name…" maxlength="24" />
          <button class="add-btn" id="add-btn">Add</button>
        </div>
        <div class="swatches" id="swatches"></div>
      </div>
    </div>
  </div>
</div>

<header>
  <div class="header-left">
    <h1>Declaration AI — GTM Tracker</h1>
    <p>Latvia &amp; EU Expansion · 2026 · Baltic AI / LETT 2000 SIA</p>
  </div>
  <div class="header-right">
    <button class="team-btn" id="team-btn">👥 Team</button>
    <div id="sync-status" class="syncing">
      <div class="sync-dot pulse"></div>
      <span id="sync-label">Connecting…</span>
    </div>
    <div class="progress-badge"><span id="ovr-pct">0</span>% Overall</div>
  </div>
</header>

<div id="filter-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-chip active" data-fid="all">All Tasks</button>
  <span id="member-chips"></span>
</div>

<div id="kpi-section"></div>
<div id="focus-section"></div>

        { id:'p7-de-adapt',  t:'Build Germany ATLAS adapter: CUSDEC-format output for AES (export declarations) and NCTS (transit) — test against Zoll official sandbox environment' },
        { id:'p7-de-pilot',  t:'Test ATLAS adapter with 1–2 German broker pilots in Hamburg or Duisburg — the largest freight hub clusters in Germany, highest declaration volumes' },
        { id:'p7-de-out',    t:'Run outreach campaign to 30+ German customs brokers and freight forwarders — focus on Hamburg, Bremen, Frankfurt, Duisburg clusters — use DSLV and BGA member directories' },
        { id:'p7-de-sign',   t:'🎯 Sign 3–5 German paying customers at €1,000–2,000/month — German market has higher pricing tolerance than Baltics due to larger declaration volumes per broker' },
      ]},
      { t:'NETHERLANDS EXPANSION', tasks:[
        { id:'p7-nl-res',    t:'Research Netherlands Douane AGS system (Aangiftesysteem Goederen): XML field requirements, submission API, Rotterdam and Schiphol air cargo-specific workflow considerations' },
        { id:'p7-nl-adapt',  t:'Build Netherlands AGS adapter — Netherlands is the #1 EU import gateway (Rotterdam port), so the average broker handles very high declaration volumes' },
        { id:'p7-nl-out',    t:'Outreach to Rotterdam and Amsterdam customs brokers and freight forwarders — prioritise those handling Schiphol air cargo and Rotterdam sea freight flows' },
        { id:'p7-nl-sign',   t:'🎯 Sign 2–3 Netherlands paying customers — BeNeLux foothold also opens the door for a white-label partnership discussion with Stream Software' },
      ]},
      { t:'ICS2 PRE-ARRIVAL SAFETY FILING MODULE', tasks:[
        { id:'p7-ics2-res',  t:'Research ICS2 (Import Control System 2) requirements in full: Entry Summary Declaration (ENS) field requirements, filing timelines (4h/24h before arrival), who is obligated — broker vs carrier' },
        { id:'p7-ics2-scp',  t:'Scope the ICS2 module: which data from existing extraction pipeline is reusable, what new fields are required (UCR, LRN, safety data), UI design for the pre-arrival filing flow' },
        { id:'p7-ics2-bld',  t:'Build ICS2 pre-arrival safety declaration module — integrate with the document upload and extraction pipeline, generate ICS2-compliant XML for EU Customs Data Hub submission' },
        { id:'p7-ics2-tst',  t:'Test ICS2 module with customers handling Riga air cargo (LV000240 Lidostas MKP) — air imports require 4-hour pre-arrival filing, the ideal real-world test case' },
        { id:'p7-ics2-mkt',  t:'Actively market the ICS2 capability — most SMB tools including Digicust and Customs4trade have limited ICS2 coverage. Feature prominently on landing page and LinkedIn.' },
      ]},
      { t:'SCALE & SERIES A PREPARATION', tasks:[
        { id:'p7-hire-s',    t:'Make first sales/BD hire using raised capital — ideally German or Dutch speaking with customs or logistics background, immediately owns DE and NL pipeline and deal execution' },
        { id:'p7-hire-cs',   t:'Hire a Customer Success manager — once the customer count exceeds 10, CS quality becomes a retention and expansion risk that cannot be managed by the founding team alone' },
        { id:'p7-mrr15k',    t:'🎯 Hit €15,000 MRR across LV + EE + LT + DE + NL — the minimum credible threshold for Series A conversations with top-tier EU B2B SaaS investors' },
        { id:'p7-cust20',    t:'🎯 Reach 20 paying customers across 5 markets — proves the multi-market GTM playbook is repeatable, which is the core Series A investment thesis' },
        { id:'p7-series-a',  t:'Prepare Series A materials: 18-month cohort retention data, NRR, churn rate, CAC by market, unit economics per tier — target €2–5M Series A at 5–8× ARR valuation' },
        { id:'p7-sa-vcs',    t:'Outreach to EU-focused Series A VCs: Balderton Capital, Point Nine Capital, Northzone, Target Global, Dawn Capital — all have strong B2B SaaS and RegTech portfolios' },
      ]},
    ]
  },
];

/* ── STATE ── */
let state = {
  checked: {}, kpis: { kpi_cust:0, kpi_mrr:0, kpi_ctry:0, kpi_cap:0 },
  collapsed: {}, members: [], assignments: {}, customTasks: {},
};
let _timer = null, _suppress = false;

/* ── HELPERS ── */
function customTasksForSec(phId, si) { return (state.customTasks[phId+'_'+si])||[]; }
function allTasks() {
  const r=[];
  PHASES.forEach(ph=>ph.sections.forEach((s,si)=>{ s.tasks.forEach(t=>r.push(t)); customTasksForSec(ph.id,si).forEach(t=>r.push(t)); }));
  return r;
}
function getTask(id) { return allTasks().find(t=>t.id===id); }
function phDone(ph) { return ph.sections.flatMap((s,si)=>[...s.tasks,...customTasksForSec(ph.id,si)]).filter(t=>state.checked[t.id]).length; }
function phTotal(ph) { return ph.sections.flatMap((s,si)=>[...s.tasks,...customTasksForSec(ph.id,si)]).length; }
function totalDone() { return allTasks().filter(t=>state.checked[t.id]).length; }
function totalAll() { return allTasks().length; }
function getMbr(id) { return state.members.find(m=>m.id===id); }
function initials(name) {
  const p=name.trim().split(/\s+/);
  return p.length===1 ? p[0].substring(0,2).toUpperCase() : (p[0][0]+p[p.length-1][0]).toUpperCase();
}
function activePh() {
  for(let i=0;i<PHASES.length;i++) { if(PHASES[i].sections.flatMap((s,si)=>[...s.tasks,...customTasksForSec(PHASES[i].id,si)]).some(t=>!state.checked[t.id])) return i; }
  return PHASES.length-1;
}

/* ── SUPABASE ── */
async function loadState() {
  const {data,error} = await sb.from('gtm_state').select('data').eq('id',1).single();
  if(error){setSS('error','Load failed');return;}
  if(data&&data.data&&Object.keys(data.data).length>0) { state={...state,...data.data}; if(!state.customTasks) state.customTasks={}; }
}
function schedSave() { clearTimeout(_timer); _timer=setTimeout(persist,800); }
async function persist() {
  setSS('syncing','Saving…'); _suppress=true;
  const {error}=await sb.from('gtm_state').update({data:state,updated_at:new Date().toISOString()}).eq('id',1);
  if(error){setSS('error','Save failed');_suppress=false;return;}
  setSS('synced','✓ Synced'); setTimeout(()=>setSS('synced','✓ Live'),1500);
}
function setupRT() {
  sb.channel('gtm_ch').on('postgres_changes',{event:'UPDATE',schema:'public',table:'gtm_state',filter:'id=eq.1'},(p)=>{
    if(_suppress){_suppress=false;return;}
    const r=p.new.data;
    if(r&&typeof r==='object'){state={...state,...r};renderAll();setSS('updated','↓ Updated');setTimeout(()=>setSS('synced','✓ Live'),2000);}
  }).subscribe(s=>{if(s==='SUBSCRIBED')setSS('synced','✓ Live');});
}
function setSS(cls,txt) {
  const el=document.getElementById('sync-status');
  const dot=el.querySelector('.sync-dot');
  el.className=cls; document.getElementById('sync-label').textContent=txt;
  dot.className='sync-dot'+(cls==='syncing'?' pulse':'');
}

/* ── RENDER ── */
function renderAll() {
  renderKpis(); renderFocus(); renderFilterBar(); renderPhases();
  document.getElementById('ovr-pct').textContent = totalAll()?Math.round(totalDone()/totalAll()*100):0;
}

function renderKpis() {
  document.getElementById('kpi-section').innerHTML = KPIS.map(k=>`
    <div class="kpi-tile">
      <div class="kpi-icon">${k.icon}</div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value"><input type="number" min="0" value="${state.kpis[k.id]||0}" data-kpi="${k.id}" /></div>
      <div class="kpi-target">${k.target}</div>
    </div>`).join('');
  document.querySelectorAll('[data-kpi]').forEach(inp=>inp.addEventListener('change',e=>{
    state.kpis[e.target.dataset.kpi]=Number(e.target.value); schedSave();
  }));
}

function renderFocus() {
  const ph=PHASES[activePh()];
  document.getElementById('focus-section').innerHTML=`
    <div class="focus-eyebrow">🎯 CURRENT FOCUS</div>
    <div class="focus-title">Phase ${ph.num} — ${ph.title}</div>
    <div class="focus-desc">${ph.goal}</div>
    <div class="focus-tags">${ph.tags.map(t=>`<span class="focus-tag">${t}</span>`).join('')}</div>`;
}

function renderFilterBar() {
  document.getElementById('member-chips').innerHTML = state.members.map(m=>`
    <button class="filter-chip ${activeFilter===m.id?'active':''}" data-fid="${m.id}">
      <span class="chip-avatar" style="background:${m.color}">${initials(m.name)}</span>${m.name}
    </button>`).join('');
  document.querySelectorAll('[data-fid]').forEach(b=>b.onclick=()=>{
    activeFilter=b.dataset.fid;
    document.querySelectorAll('[data-fid]').forEach(x=>x.classList.toggle('active',x.dataset.fid===activeFilter));
    applyFilter();
  });
}

function applyFilter() {
  document.querySelectorAll('.task-row').forEach(row=>{
    if(activeFilter==='all'){row.classList.remove('hidden-by-filter');return;}
    row.classList.toggle('hidden-by-filter', state.assignments[row.dataset.tid]!==activeFilter);
  });
}

function renderPhases() {
  document.getElementById('phases-container').innerHTML = PHASES.map(ph=>{
    const done=phDone(ph), total=phTotal(ph), pct=total?Math.round(done/total*100):0;
    const open=state.collapsed[ph.id]!==false;
    const secs=ph.sections.map((sec,si)=>{
      const ct=customTasksForSec(ph.id,si);
      const allSecTasks=[...sec.tasks,...ct];
      const doneCount=allSecTasks.filter(t=>state.checked[t.id]).length;
      return `
      <div class="phase-section">
        <div class="section-header"><span>${sec.t}</span><span class="section-count">${doneCount}/${allSecTasks.length}</span></div>
        ${sec.tasks.map(task=>taskRowHtml(task,false)).join('')}
        ${ct.map(task=>taskRowHtml(task,true)).join('')}
        <button class="add-task-btn" data-phid="${ph.id}" data-si="${si}">+ Add Task</button>
      </div>`;
    }).join('');
    return `
    <div class="phase-card pc-${ph.id}" id="pc-${ph.id}">
      <div class="phase-header" data-pid="${ph.id}">
        <div class="ph-left">
          <div class="phase-num">PHASE ${ph.num}</div>
          <div class="phase-title">${ph.title}</div>
          <div class="phase-timeline">${ph.timeline}</div>
          <div class="phase-goal">${ph.goal}</div>
        </div>
        <div class="ph-right">
          <div><div class="phase-prog-count">${done}/${total}</div><div class="phase-prog-label">tasks done</div></div>
          <div class="phase-chevron ${open?'open':''}">▼</div>
        </div>
      </div>
      <div class="phase-progress-bar"><div class="phase-progress-fill" style="width:${pct}%"></div></div>
      <div class="phase-body ${open?'open':''}">${secs}</div>
    </div>`;
  }).join('');

  // Phase toggle
  document.querySelectorAll('.phase-header[data-pid]').forEach(hdr=>hdr.addEventListener('click',e=>{
    if(e.target.closest('.task-row')) return;
    const pid=hdr.dataset.pid;
    const body=hdr.parentElement.querySelector('.phase-body');
    const chev=hdr.querySelector('.phase-chevron');
    const isOpen=body.classList.toggle('open');
    chev.classList.toggle('open',isOpen);
    state.collapsed[pid]=isOpen; schedSave();
  }));

  // Checkboxes
  document.querySelectorAll('.task-checkbox').forEach(chk=>chk.addEventListener('change',e=>{
    const id=e.target.dataset.tid;
    state.checked[id]=e.target.checked;
    const row=e.target.closest('.task-row');
    row.classList.toggle('completed',e.target.checked);
    updatePhCard(row.closest('.phase-card'));
    document.getElementById('ovr-pct').textContent=Math.round(totalDone()/totalAll()*100);
    renderFocus(); schedSave();
  }));

  // Assign buttons
  document.querySelectorAll('.assign-wrap').forEach(wrap=>wrap.addEventListener('click',e=>{
    e.stopPropagation();
    const tid=wrap.dataset.tid;
    if(openDropTask===tid){closeDrop();return;}
    closeDrop(); openDropTask=tid; showDrop(wrap,tid);
  }));

  // Add Task buttons
  document.querySelectorAll('.add-task-btn').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();
    const phid=btn.dataset.phid, si=btn.dataset.si;
    if(btn.nextElementSibling&&btn.nextElementSibling.classList.contains('add-task-row')) return;
    const row=document.createElement('div'); row.className='add-task-row';
    row.innerHTML=`<input type="text" class="add-task-input" placeholder="Describe the task\u2026" autofocus /><button class="add-task-confirm">Add</button><button class="add-task-cancel">Cancel</button>`;
    btn.parentElement.insertBefore(row, btn.nextSibling);
    const inp=row.querySelector('.add-task-input'); inp.focus();
    function doAdd(){ const txt=inp.value.trim(); if(!txt){row.remove();return;} const key=phid+'_'+si; if(!state.customTasks[key])state.customTasks[key]=[]; state.customTasks[key].push({id:'ct_'+Date.now(),t:txt}); row.remove(); renderAll(); schedSave(); }
    row.querySelector('.add-task-confirm').onclick=doAdd;
    row.querySelector('.add-task-cancel').onclick=()=>row.remove();
    inp.onkeydown=ev=>{if(ev.key==='Enter')doAdd();if(ev.key==='Escape')row.remove();};
  }));

  // Delete custom task buttons
  document.querySelectorAll('.task-delete').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();
    const tid=btn.dataset.del;
    if(!confirm('Delete this custom task?')) return;
    for(const key of Object.keys(state.customTasks)){
      state.customTasks[key]=state.customTasks[key].filter(t=>t.id!==tid);
      if(state.customTasks[key].length===0) delete state.customTasks[key];
    }
    delete state.checked[tid]; delete state.assignments[tid];
    renderAll(); schedSave();
  }));

  document.addEventListener('click',()=>closeDrop());
  applyFilter();
}

function taskRowHtml(task, isCustom) {
  const chk=state.checked[task.id];
  const mid=state.assignments[task.id];
  const m=mid?getMbr(mid):null;
  const av = m
    ? `<div class="assign-avatar" style="background:${m.color};border-color:${m.color}" title="${m.name}">${initials(m.name)}</div>`
    : `<div class="assign-avatar unassigned" title="Assign">+</div>`;
  const assignBtn = state.members.length
    ? `<div class="assign-wrap" data-tid="${task.id}" title="Assign to team member">${av}</div>` : '';
  const delBtn = isCustom ? `<button class="task-delete" data-del="${task.id}" title="Delete task">&times;</button>` : '';
  return `<div class="task-row ${chk?'completed':''}" data-tid="${task.id}">
    <input type="checkbox" class="task-checkbox" data-tid="${task.id}" ${chk?'checked':''} />
    <span class="task-text">${task.t}</span>
    ${assignBtn}${delBtn}
  </div>`;
}

function showDrop(wrap,tid) {
  const mid=state.assignments[tid];
  const d=document.createElement('div');
  d.className='assign-dropdown'; d.id='adrop';
  d.innerHTML = state.members.map(m=>`
    <div class="assign-option" data-mid="${m.id}">
      <span class="ao-avatar" style="background:${m.color}">${initials(m.name)}</span>${m.name}
    </div>`).join('')
    + (mid?`<div class="assign-divider"></div><div class="assign-option" data-mid="__none"><span class="ao-avatar" style="background:#e2e8f0;color:#64748b">✕</span>Unassign</div>`:'');
  d.querySelectorAll('.assign-option').forEach(opt=>opt.addEventListener('click',e=>{
    e.stopPropagation();
    const mid2=opt.dataset.mid;
    if(mid2==='__none') delete state.assignments[tid];
    else state.assignments[tid]=mid2;
    closeDrop();
    // Patch just the assign button of this row
    const row=document.querySelector(`.task-row[data-tid="${tid}"]`);
    if(row){
      const task=getTask(tid);
      if(task){
        const newMid=state.assignments[tid];
        const m2=newMid?getMbr(newMid):null;
        const newAv = m2
          ? `<div class="assign-avatar" style="background:${m2.color};border-color:${m2.color}" title="${m2.name}">${initials(m2.name)}</div>`
          : `<div class="assign-avatar unassigned" title="Assign">+</div>`;
        let aw=row.querySelector('.assign-wrap');
        if(!aw&&state.members.length){
          aw=document.createElement('div'); aw.className='assign-wrap'; aw.dataset.tid=tid; row.appendChild(aw);
          aw.addEventListener('click',ev=>{ev.stopPropagation();if(openDropTask===tid){closeDrop();return;}closeDrop();openDropTask=tid;showDrop(aw,tid);});
        }
        if(aw) aw.innerHTML=newAv;
      }
    }
    applyFilter(); schedSave();
  }));
  wrap.style.position='relative'; wrap.appendChild(d);
}

function closeDrop() {
  const d=document.getElementById('adrop'); if(d) d.remove(); openDropTask=null;
}

function updatePhCard(card) {
  if(!card) return;
  const pid=card.id.replace('pc-','');
  const ph=PHASES.find(p=>p.id===pid); if(!ph) return;
  const done=phDone(ph), total=phTotal(ph), pct=total?Math.round(done/total*100):0;
  const pc=card.querySelector('.phase-prog-count'); if(pc) pc.textContent=`${done}/${total}`;
  const pf=card.querySelector('.phase-progress-fill'); if(pf) pf.style.width=pct+'%';
  card.querySelectorAll('.phase-section').forEach(secEl=>{
    const sc=secEl.querySelector('.section-count');
    if(sc){const d2=secEl.querySelectorAll('.task-row.completed').length,t2=secEl.querySelectorAll('.task-row').length;sc.textContent=`${d2}/${t2}`;}
  });
}

/* ── MEMBER MODAL ── */
function renderMList() {
  const el=document.getElementById('m-list');
  el.innerHTML=state.members.length
    ? state.members.map(m=>`
      <div class="m-item">
        <div class="m-av" style="background:${m.color}">${initials(m.name)}</div>
        <div class="m-name">${m.name}</div>
        <button class="m-rm" data-rmid="${m.id}" title="Remove">×</button>
      </div>`).join('')
    : '<div class="empty-m">No team members yet. Add one below.</div>';
  el.querySelectorAll('[data-rmid]').forEach(btn=>btn.onclick=()=>{
    const id=btn.dataset.rmid;
    state.members=state.members.filter(m=>m.id!==id);
    Object.keys(state.assignments).forEach(tid=>{if(state.assignments[tid]===id)delete state.assignments[tid];});
    if(activeFilter===id){activeFilter='all';document.querySelectorAll('[data-fid]').forEach(b=>b.classList.toggle('active',b.dataset.fid==='all'));}
    renderAll(); schedSave();
  });
}

function renderSwatches() {
  document.getElementById('swatches').innerHTML=PALETTE.map(c=>`
    <div class="swatch ${c===selColor?'sel':''}" style="background:${c}" data-c="${c}"></div>`).join('');
  document.querySelectorAll('.swatch').forEach(s=>s.onclick=()=>{selColor=s.dataset.c;renderSwatches();});
}

/* ── EVENTS ── */
document.getElementById('team-btn').onclick=()=>{
  document.getElementById('team-overlay').classList.add('open');
  renderMList(); renderSwatches();
};
document.getElementById('modal-close').onclick=()=>document.getElementById('team-overlay').classList.remove('open');
document.getElementById('team-overlay').onclick=e=>{if(e.target===e.currentTarget)document.getElementById('team-overlay').classList.remove('open');};

document.getElementById('add-btn').onclick=()=>{
  const inp=document.getElementById('new-name'); const name=inp.value.trim(); if(!name) return;
  state.members.push({id:'m'+Date.now(),name,color:selColor});
  inp.value=''; selColor=PALETTE[state.members.length%PALETTE.length];
  renderAll(); renderMList(); renderSwatches(); schedSave();
};
document.getElementById('new-name').onkeydown=e=>{if(e.key==='Enter')document.getElementById('add-btn').click();};

document.getElementById('reset-btn').onclick=()=>{
  if(!confirm('Reset all task progress? Members, assignments, and KPIs will be kept.')) return;
  state.checked={}; state.collapsed={};
  PHASES.forEach((ph,i)=>state.collapsed[ph.id]=i===0);
  renderAll(); schedSave();
};
document.getElementById('save-btn').onclick=persist;

/* ── INIT ── */
(async function() {
  setSS('syncing','Connecting…');
  PHASES.forEach((ph,i)=>{if(!(ph.id in state.collapsed))state.collapsed[ph.id]=i===0;});
  await loadState();
  PHASES.forEach((ph,i)=>{if(!(ph.id in state.collapsed))state.collapsed[ph.id]=i===0;});
  renderAll();
  const ov=document.getElementById('loading-overlay');
  ov.classList.add('hidden'); setTimeout(()=>ov.style.display='none',500);
  setupRT();

  /* ── MONSTER MASCOT ── */
  const monster = document.getElementById('gtm-monster');
  let monsterBusy = false;

  function triggerMonster() {
    if (monsterBusy) return;
    monsterBusy = true;
    monster.className = ''; // reset classes

    const roll = Math.random();
    if (roll < 0.15) {
      // Rare: run across screen
      monster.style.right = 'auto';
      monster.style.left = '-100px';
      monster.classList.add('run-across');
      setTimeout(() => { monster.className = ''; monster.style.left = ''; monsterBusy = false; }, 4200);
    } else if (roll < 0.5) {
      // Peek from left
      monster.classList.add('peek-left');
      setTimeout(() => { monster.className = ''; monsterBusy = false; }, 5200);
    } else {
      // Peek from right
      monster.classList.add('peek-right');
      setTimeout(() => { monster.className = ''; monsterBusy = false; }, 5200);
    }
  }

  // Click handler — bounce!
  monster.addEventListener('click', e => {
    e.stopPropagation();
    monster.className = '';
    void monster.offsetWidth; // force reflow
    monster.style.right = monster.style.right || '40px';
    monster.classList.add('clicked');
    setTimeout(() => { monster.className = ''; monsterBusy = false; }, 800);
  });

  // First appearance after 8-15s, then random 35-80s interval
  setTimeout(() => {
    triggerMonster();
    setInterval(() => triggerMonster(), (35 + Math.random() * 45) * 1000);
  }, (8 + Math.random() * 7) * 1000);

  setupRT();
})();
</script>
